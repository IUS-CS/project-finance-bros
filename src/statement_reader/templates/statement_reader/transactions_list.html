<!DOCTYPE html>
{% load static %}
<html lang="en">
<header>
    <a href="http://localhost:8000"><img src="{% static 'statement_reader/images/home_button.png' %}"
                                         style="width:42px;height:42px;" alt="home">
    </a>
</header>
<body>
  <link rel="stylesheet" href="{% static 'statement_reader/css/style.css' %}">
  <h1>Transactions</h1>

  <ul>
    {% for x in transactions %}
        <li>
          {{ x.vendor_name }}
          ${{ x.amount }}
          {{ x.date }}
          <a href="{% url 'transaction_edit_form' x.pk %}">
            Edit Item
          </a>
          <a href="{% url 'transaction_delete_item' x.pk %}">
            Delete Item
          </a>
        </li>

    {% endfor %}
  </ul>

</body>

</html>
